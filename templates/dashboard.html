{% extends 'base.html' %}

{% block content %}

<div class="mb-4">
    <h2>Dashboard</h2>
    <p class="text-muted">
        Welcome to the School Management System.
    </p>
</div>

<div class="row">

    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Total Schools</h5>
                <h2>{{ total_schools }}</h2>
                <a href="{% url 'school_list' %}" class="btn btn-primary btn-sm">
                    View Schools
                </a>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body">
                <h5>Total Students</h5>
                <h2>{{ total_students }}</h2>
                <a href="{% url 'student_list' %}" class="btn btn-primary btn-sm">
                    View Students
                </a>
            </div>
        </div>
    </div>

</div>

{% endblock %}
